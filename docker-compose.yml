services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-community_forum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-community_forum}
      POSTGRES_DB: ${POSTGRES_DB:-community_forum}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-community_forum} -d ${POSTGRES_DB:-community_forum}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
